services:
  agent:
    build:
      context: ./agent
    container_name: gojo-agent
    restart: always
    ports:
      - "8000:8000"
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_BASE: ${DEEPSEEK_API_BASE:-https://api.deepseek.com}
      LLM_MODEL: ${LLM_MODEL:-deepseek-v4-pro}
      GO_BACKEND_BASE_URL: ${GO_BACKEND_BASE_URL:-http://host.docker.internal:8080}
      AGENT_DEBUG: ${AGENT_DEBUG:-false}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-v3}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      MEMORY_COLLECTION: ${MEMORY_COLLECTION:-study_plan_memories}
      MEMORY_TOP_K: ${MEMORY_TOP_K:-3}
    volumes:
      - ./agent:/app
    depends_on:
      - qdrant
    networks:
      - oj-net

  redis:
    image: redis:latest
    container_name: oj-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - oj-net

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: oj-search
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    networks:
      - oj-net

  kibana:
    image: kibana:8.11.0
    container_name: oj-kibana
    restart: always
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - oj-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: oj-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
      - ./infrastructure/qdrant/config.yaml:/qdrant/config/config.yaml
    networks:
      - oj-net

networks:
  oj-net:
    driver: bridge

volumes:
  qdrant_storage:
